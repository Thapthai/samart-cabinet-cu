# ================================
# Frontend (Next.js) - Production — Smart Cabinet CU
# ================================
# ใช้จากโฟลเดอร์ frontend: docker compose -f docker/docker-compose.yml --env-file .env up -d --build
# ถ้า deploy คนละเครื่องกับ sv map (ออกนอก): ใส่ใน .env ตาม frontend/.env.server.example
#   NEXTAUTH_URL + NEXT_PUBLIC_API_URL + BACKEND_API_URL = URL ภายนอก (โดเมนที่ชี้ไป sv map)

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/smart-cabinet-cu/v1}
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/smart-cabinet-cu}
    image: frontend-smart-cabinet:latest
    container_name: smart-cabinet-frontend
    restart: unless-stopped
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - PORT=4100
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/smart-cabinet-cu/v1}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/smart-cabinet-cu}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://host.docker.internal:4000/api/smart-cabinet-cu/v1}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:4100/smart-cabinet-cu}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4100/smart-cabinet-cu"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: frontend-network
